services:
  app:
    build: .
    depends_on:
      - db

  worker:
    build: .
    command: php bin/console messenger:consume async

  nginx:
    image: nginx:1.19.6-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf.prod:/etc/nginx/conf.d/default.conf:ro
      - ./app/:/var/www/app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: